name: CD (Deploy to GitHub Pages)

on:
  # @see https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#workflow_run
  # @see https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#running-a-workflow-based-on-the-conclusion-of-another-workflow
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-to-pages
  cancel-in-progress: false

jobs:
  check:
    name: Deploy pre check
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.gen_output.outputs.result }}

    steps:
      - id: gen_output
        if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
        run: |
          echo "result=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs:
      - check
    if: ${{ needs.check.outputs.result }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Dependencies
        uses: marcalexiei/github-actions/.github/actions/setup-node-and-pnpm@f27a68a73a799c79d7158cf4a98d7e3d5e8e23be # v1.1.0

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build
        run: |
          pnpm run build
          touch ./dist/.nojekyll
          cp ./404.html ./dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs:
      - check
      - build
    if: ${{ needs.check.outputs.result }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: Site
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  failure:
    name: "Failure"
    runs-on: ubuntu-latest
    needs:
      - check
    if: ${{ !needs.check.outputs.result }}

    steps:
      - run: echo 'CI failed. Deploy won't be executed'

